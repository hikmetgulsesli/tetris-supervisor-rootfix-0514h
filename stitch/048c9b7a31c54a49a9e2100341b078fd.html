<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TETRIS SUPERVISOR - Game Over</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#003640",
                        "secondary": "#b9c7e0",
                        "on-primary-fixed": "#001f26",
                        "on-background": "#dee3e6",
                        "inverse-on-surface": "#2b3133",
                        "surface-container-highest": "#303638",
                        "on-primary-fixed-variant": "#004e5c",
                        "surface-dim": "#0e1416",
                        "outline": "#869397",
                        "primary-container": "#06b6d4",
                        "surface": "#0e1416",
                        "surface-bright": "#343a3c",
                        "outline-variant": "#3d494c",
                        "secondary-container": "#3c4a5e",
                        "on-secondary-container": "#abb9d2",
                        "on-secondary-fixed": "#0d1c2f",
                        "inverse-surface": "#dee3e6",
                        "surface-container-high": "#252b2d",
                        "tertiary-fixed-dim": "#ffb873",
                        "surface-container-low": "#171d1e",
                        "on-tertiary": "#4b2800",
                        "on-surface-variant": "#bcc9cd",
                        "inverse-primary": "#00687a",
                        "tertiary-container": "#e89337",
                        "tertiary-fixed": "#ffdcbf",
                        "background": "#0e1416",
                        "on-tertiary-fixed": "#2d1600",
                        "surface-tint": "#4cd7f6",
                        "tertiary": "#ffb873",
                        "primary-fixed-dim": "#4cd7f6",
                        "on-surface": "#dee3e6",
                        "primary": "#4cd7f6",
                        "on-primary-container": "#00424f",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "surface-variant": "#303638",
                        "surface-container": "#1b2122",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "primary-fixed": "#acedff",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-tertiary-container": "#5b3200",
                        "on-secondary": "#233144",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#d5e3fd",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-container-lowest": "#090f11"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "target-min": "44px",
                        "unit": "4px",
                        "gutter": "16px",
                        "grid-gap": "1px",
                        "panel-padding": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "terminal-sm": ["Geist"],
                        "headline-lg": ["Geist"],
                        "display-score": ["Geist"],
                        "headline-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-caps": ["Geist"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "terminal-sm": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "display-score": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-target-min bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant">
<div class="flex items-center gap-4">
<span class="text-headline-md font-headline-md font-bold tracking-tighter text-primary dark:text-primary uppercase">TETRIS SUPERVISOR</span>
</div>
<div class="flex items-center gap-2">
<button class="h-target-min w-target-min flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 rounded">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="h-target-min w-target-min flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 rounded">
<span class="material-symbols-outlined">terminal</span>
</button>
</div>
</header>
<!-- Main Content Area: Game Over Overlay -->
<main class="flex-grow flex items-center justify-center pt-target-min pb-16 md:pb-0 px-gutter relative overflow-hidden">
<!-- Faint Grid Background to represent terminal deep background -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at center, #334155 1px, transparent 1px); background-size: 24px 24px;"></div>
<!-- Backdrop Filter for Depth -->
<div class="relative z-10 w-full max-w-md bg-surface-container-low/80 backdrop-blur-md border border-outline-variant rounded-lg shadow-2xl p-6 md:p-8 flex flex-col gap-8">
<!-- Header Section -->
<div class="text-center space-y-2">
<h1 class="text-display-score font-display-score text-error animate-pulse">GAME OVER</h1>
<p class="text-terminal-sm font-terminal-sm text-on-surface-variant">BLOCK PLACEMENT FAILED. TERMINAL LOCKED.</p>
</div>
<!-- Stats Container -->
<div class="bg-surface border border-outline-variant rounded p-4 flex flex-col gap-4 relative overflow-hidden">
<!-- Decorative Top Left Label -->
<div class="absolute top-0 left-0 bg-outline-variant text-on-surface-variant px-2 py-1 flex items-center gap-1 rounded-br">
<span class="h-1.5 w-1.5 rounded-full bg-error animate-ping"></span>
<span class="text-[10px] font-label-caps uppercase tracking-widest">SYS_RPT_FINAL</span>
</div>
<div class="pt-6 space-y-4">
<!-- Final Score -->
<div class="flex justify-between items-end border-b border-surface-container-highest pb-2">
<span class="text-label-caps font-label-caps text-on-surface-variant">FINAL SCORE</span>
<div class="flex items-center gap-2">
<span class="bg-tertiary-container text-on-tertiary-container text-[10px] font-bold px-1.5 py-0.5 rounded-sm uppercase tracking-wider">NEW HIGH</span>
<span class="text-headline-lg font-headline-lg text-primary">1,245,900</span>
</div>
</div>
<!-- Lines Cleared -->
<div class="flex justify-between items-end border-b border-surface-container-highest pb-2">
<span class="text-label-caps font-label-caps text-on-surface-variant">LINES CLEARED</span>
<span class="text-headline-md font-headline-md text-on-surface">142</span>
</div>
<!-- Level Reached -->
<div class="flex justify-between items-end">
<span class="text-label-caps font-label-caps text-on-surface-variant">LEVEL REACHED</span>
<span class="text-headline-md font-headline-md text-on-surface">15</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full h-target-min flex items-center justify-center gap-2 bg-primary text-on-primary font-label-caps text-label-caps rounded border border-primary hover:bg-primary-fixed transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">replay</span>
                    PLAY AGAIN
                </button>
<div class="grid grid-cols-2 gap-3">
<button class="w-full h-target-min flex items-center justify-center gap-2 bg-transparent text-primary border border-outline-variant rounded font-label-caps text-label-caps hover:bg-surface-container-highest hover:border-primary transition-all active:scale-95 duration-100">
<span class="material-symbols-outlined">leaderboard</span>
                        LEADERBOARD
                    </button>
<button class="w-full h-target-min flex items-center justify-center gap-2 bg-transparent text-on-surface-variant border border-outline-variant rounded font-label-caps text-label-caps hover:bg-surface-container-highest hover:text-error hover:border-error transition-all active:scale-95 duration-100">
<span class="material-symbols-outlined">logout</span>
                        EXIT MENU
                    </button>
</div>
</div>
<!-- Mini Supervisor Feed -->
<div class="mt-2 p-2 bg-surface-dim border-t border-outline-variant text-terminal-sm font-terminal-sm text-on-surface-variant opacity-70">
<div class="flex items-center gap-2">
<span class="text-error">&gt;</span>
<span class="typing-animation">CRITICAL FAILURE AT ROW 20. SESSION TERMINATED.</span>
</div>
</div>
</div>
</main>
</body></html>
