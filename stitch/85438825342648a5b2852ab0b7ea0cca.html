<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Supervisor - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .bg-tetris-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(61, 73, 76, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(61, 73, 76, 0.15) 1px, transparent 1px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary": "#003640",
                        "secondary": "#b9c7e0",
                        "on-primary-fixed": "#001f26",
                        "on-background": "#dee3e6",
                        "inverse-on-surface": "#2b3133",
                        "surface-container-highest": "#303638",
                        "on-primary-fixed-variant": "#004e5c",
                        "surface-dim": "#0e1416",
                        "outline": "#869397",
                        "primary-container": "#06b6d4",
                        "surface": "#0e1416",
                        "surface-bright": "#343a3c",
                        "outline-variant": "#3d494c",
                        "secondary-container": "#3c4a5e",
                        "on-secondary-container": "#abb9d2",
                        "on-secondary-fixed": "#0d1c2f",
                        "inverse-surface": "#dee3e6",
                        "surface-container-high": "#252b2d",
                        "tertiary-fixed-dim": "#ffb873",
                        "surface-container-low": "#171d1e",
                        "on-tertiary": "#4b2800",
                        "on-surface-variant": "#bcc9cd",
                        "inverse-primary": "#00687a",
                        "tertiary-container": "#e89337",
                        "tertiary-fixed": "#ffdcbf",
                        "background": "#0e1416",
                        "on-tertiary-fixed": "#2d1600",
                        "surface-tint": "#4cd7f6",
                        "tertiary": "#ffb873",
                        "primary-fixed-dim": "#4cd7f6",
                        "on-surface": "#dee3e6",
                        "primary": "#4cd7f6",
                        "on-primary-container": "#00424f",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "surface-variant": "#303638",
                        "surface-container": "#1b2122",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "primary-fixed": "#acedff",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-tertiary-container": "#5b3200",
                        "on-secondary": "#233144",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#d5e3fd",
                        "secondary-fixed-dim": "#b9c7e0",
                        "surface-container-lowest": "#090f11"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "target-min": "44px",
                        "unit": "4px",
                        "gutter": "16px",
                        "grid-gap": "1px",
                        "panel-padding": "24px"
                    },
                    fontFamily: {
                        "body-md": ["Geist"],
                        "terminal-sm": ["Geist"],
                        "headline-lg": ["Geist"],
                        "display-score": ["Geist"],
                        "headline-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "label-caps": ["Geist"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "terminal-sm": ["14px", { lineHeight: "1.4", letterSpacing: "0.02em", fontWeight: "500" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],
                        "display-score": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "1.2", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.5", fontWeight: "400" }],
                        "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.1em", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-on-background selection:bg-primary selection:text-on-primary">
<!-- Blurred Background Grid -->
<div class="absolute inset-0 z-0 bg-tetris-grid opacity-50 blur-[2px] transform scale-110"></div>
<!-- Central Vignette for Depth -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0e1416_70%)]"></div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center w-full max-w-lg px-gutter">
<!-- Header Section -->
<div class="text-center mb-12 flex flex-col items-center">
<div class="flex items-center gap-2 mb-4 text-primary opacity-80">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_rgba(76,215,246,0.8)]"></span>
<span class="text-terminal-sm font-terminal-sm uppercase">System Online</span>
</div>
<h1 class="text-display-score font-display-score text-primary uppercase tracking-tighter drop-shadow-[0_0_12px_rgba(76,215,246,0.3)]">
                TETRIS SUPERVISOR
            </h1>
<p class="text-terminal-sm font-terminal-sm text-on-surface-variant mt-2 uppercase tracking-widest">
                Command Terminal V.4.0
            </p>
</div>
<!-- Navigation / Action Menu -->
<nav class="w-full flex flex-col gap-3 relative">
<!-- Decorative corner brackets -->
<div class="absolute -top-4 -left-4 w-4 h-4 border-t-2 border-l-2 border-outline-variant"></div>
<div class="absolute -top-4 -right-4 w-4 h-4 border-t-2 border-r-2 border-outline-variant"></div>
<div class="absolute -bottom-4 -left-4 w-4 h-4 border-b-2 border-l-2 border-outline-variant"></div>
<div class="absolute -bottom-4 -right-4 w-4 h-4 border-b-2 border-r-2 border-outline-variant"></div>
<button class="group w-full h-target-min bg-surface border border-outline-variant flex items-center justify-between px-6 transition-all duration-150 hover:bg-primary hover:border-primary focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="text-label-caps font-label-caps text-on-surface group-hover:text-on-primary tracking-widest uppercase">
                    START GAME
                </span>
<span class="material-symbols-outlined text-primary group-hover:text-on-primary text-[20px]">play_arrow</span>
</button>
<button class="group w-full h-target-min bg-surface border border-outline-variant flex items-center justify-between px-6 transition-all duration-150 hover:bg-primary hover:border-primary focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="text-label-caps font-label-caps text-on-surface group-hover:text-on-primary tracking-widest uppercase">
                    CHALLENGE MODE
                </span>
<span class="material-symbols-outlined text-primary group-hover:text-on-primary text-[20px]">military_tech</span>
</button>
<button class="group w-full h-target-min bg-surface border border-outline-variant flex items-center justify-between px-6 transition-all duration-150 hover:bg-primary hover:border-primary focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="text-label-caps font-label-caps text-on-surface group-hover:text-on-primary tracking-widest uppercase">
                    CONTROLS
                </span>
<span class="material-symbols-outlined text-primary group-hover:text-on-primary text-[20px]">gamepad</span>
</button>
<button class="group w-full h-target-min bg-surface border border-outline-variant flex items-center justify-between px-6 transition-all duration-150 hover:bg-primary hover:border-primary focus:outline-none focus:ring-1 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background active:scale-[0.98]">
<span class="text-label-caps font-label-caps text-on-surface group-hover:text-on-primary tracking-widest uppercase">
                    SETTINGS
                </span>
<span class="material-symbols-outlined text-primary group-hover:text-on-primary text-[20px]">settings</span>
</button>
</nav>
<!-- Footer Log -->
<div class="mt-12 text-center opacity-50">
<p class="text-terminal-sm font-terminal-sm text-on-surface-variant">
                &gt; AWAITING COMMAND INPUT...
            </p>
</div>
</main>
</body></html>
